[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "python3.11 -m pip install -r requirements.txt --break-system-packages",
  "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "python3.11 -m uvicorn server.main:app --host 0.0.0.0 --port $PORT"
